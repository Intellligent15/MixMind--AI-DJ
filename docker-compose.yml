# AI DJ — base compose stack.
#
# The dockerized `worker` is profile-gated to `prod`. On macOS dev the
# worker runs natively (start-dev.sh) so it can use MPS for Demucs/Whisper;
# the compose worker would only race it. On the droplet:
#   COMPOSE_PROFILES=prod docker compose up -d --build
# brings the worker container up — it has no GPU and delegates heavy ML
# to Modal via app/workers/modal_stubs.py.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aidj
      POSTGRES_PASSWORD: aidj
      POSTGRES_DB: aidj
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidj -d aidj"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://aidj:aidj@postgres:5432/aidj
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./cache:/app/cache

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle by Next.js. Override at build time
        # for prod deploys, e.g. NEXT_PUBLIC_API_BASE=http://<droplet>:8000.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    environment:
      # Server-side fetches from the frontend container use docker network DNS.
      BACKEND_URL: http://backend:8000
      # Same value as the build arg above — also kept at runtime for any
      # client-side code paths that re-read it (next dev hot-reload).
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  worker:
    profiles: ["prod"]
    build:
      context: ./backend
    command: ["celery", "-A", "app.workers", "worker", "--loglevel=INFO", "--pool=solo"]
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://aidj:aidj@postgres:5432/aidj
      REDIS_URL: redis://redis:6379/0
      # YouTube anti-bot blocks datacenter IPs unless yt-dlp passes a
      # logged-in browser session. Drop a Netscape cookies.txt at
      # ./cookies.txt on the droplet (gitignored) and yt-dlp will use it.
      YT_DLP_COOKIES_FILE: /app/cookies.txt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./cache:/app/cache
      # Not :ro — yt-dlp rewrites the cookie jar on cleanup to refresh
      # session tokens. Mounting read-only causes a secondary OSError
      # that buries the real download error in the logs.
      - ./cookies.txt:/app/cookies.txt

volumes:
  postgres_data:
